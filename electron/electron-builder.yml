appId: ai.healthos.desktop
productName: HealthOS
directories:
  output: release
files:
  - "dist/main.js"
  - "dist/main.js.map"
  - "dist/preload.js"
  - "dist/preload.js.map"
  - "dist/tray.js"
  - "dist/tray.js.map"
  - "package.json"
extraResources:
  # PyInstaller bundle of the FastAPI backend. Build it first with:
  #   cd electron && uv run pyinstaller healthos-backend.spec --clean --noconfirm
  - from: "dist/healthos-backend"
    to: "healthos-backend"
mac:
  target: dmg
  category: public.app-category.healthcare-fitness
win:
  target: nsis
